<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact NeXT</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles-contact.css">
</head>

<body>

    <header>
        <div class="logo">NeXT</div>

        <nav>
            <a href="index.html">Home</a>
            <a href="About.page">Services</a>
        </nav>
    </header>

    <section class="contact-section">

        <div class="contact-box">

            <h1>Contact Us</h1>

            <p>
                Have questions or need assistance?
                Send us a message directly on WhatsApp.
            </p>

            <form id="contactForm">

                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" id="name" required>
                </div>

                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="email" required>
                </div>

                <div class="input-group">
                    <label>Phone Number</label>
                    <input type="tel" id="phone" required>
                </div>

                <div class="input-group">
                    <label>Your Message</label>
                    <textarea id="message" required></textarea>
                </div>

                <button type="submit" class="btn">
                    Send Feedback
                </button>

            </form>

            <a class="whatsapp-btn"
                href="https://wa.me/2349012144131?text=Hello%20NeXT,%20I%20would%20like%20to%20make%20an%20enquiry."
                target="_blank">
                Chat With Us On WhatsApp
            </a>

        </div>

    </section>

    <script>

        document.getElementById("contactForm")
            .addEventListener("submit", function (e) {

                e.preventDefault();

                let name = document.getElementById("name").value;
                let email = document.getElementById("email").value;
                let phone = document.getElementById("phone").value;
                let message = document.getElementById("message").value;

                let text =
                    `*New Contact Form Submission*
    
    Name: ${name}
    Email: ${email}
    Phone: ${phone}
    
    Message:
    ${message}`;

                let whatsappURL =
                    `https://wa.me/2349012144131?text=${encodeURIComponent(text)}`;

                window.open(whatsappURL, "_blank");

            });

    </script>

</body>

</html>
